<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article in Levels | News of the Day</title>
  <meta name="description" content="French news articles rewritten in Level 1, Level 2, and Level 3 for Canadian students learning French.">
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="summary-page">
  <main class="presentation-shell">
    <a class="back-link" href="index.html">Back to news</a>

    <section class="presentation-hero">
      <p class="eyebrow">French news in levels</p>
      <h1>Article in Levels</h1>
      <p>The news story is rewritten in clear French. Level 1 is simple, Level 2 adds details, and Level 3 gives a fuller version.</p>
    </section>

    <section class="presentation-card" aria-live="polite">
      <div class="presentation-meta">
        <span id="summary-level">Level</span>
        <span id="summary-source">Source</span>
      </div>
      <h2 id="summary-title">Preparing article...</h2>
      <div class="article-facts" id="article-facts" hidden></div>
      <p class="presentation-status" id="summary-status">Generating the leveled French article...</p>
      <article class="oral-text" id="summary-output"></article>
    </section>
  </main>

  <script src="summary.js"></script>
</body>
</html>
