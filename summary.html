<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Summary | News of the Day</title>
  <meta name="description" content="AI-generated French article summaries with explanations and difficulty levels for News of the Day Canada.">
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="summary-page">
  <main class="presentation-shell">
    <a class="back-link" href="index.html">Back to news</a>

    <section class="presentation-hero">
      <p class="eyebrow">French reading help</p>
      <h1>AI Article Summary</h1>
      <p>This page explains the article in French with the difficulty level selected on the news page.</p>
    </section>

    <section class="presentation-card" aria-live="polite">
      <div class="presentation-meta">
        <span id="summary-level">Level</span>
        <span id="summary-source">Source</span>
      </div>
      <h2 id="summary-title">Preparing summary...</h2>
      <div class="article-facts" id="article-facts" hidden></div>
      <p class="presentation-status" id="summary-status">Generating the article summary...</p>
      <article class="oral-text" id="summary-output"></article>
    </section>
  </main>

  <script src="summary.js"></script>
</body>
</html>
